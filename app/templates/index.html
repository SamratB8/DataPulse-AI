{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center text-center mt-5">
    <div class="col-md-8">
        <h1 class="display-4 text-primary">Welcome to DataPulse AI</h1>
        <p class="lead mt-3">A gamified AI/ML study tracker and productivity platform.</p>
        
        <div class="mt-4">
            {% if session.get('user_id') %}
                <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-lg px-4">Go to Dashboard</a>
            {% else %}
                <a href="{{ url_for('main.login') }}" class="btn btn-outline-primary btn-lg px-4 me-2">Login</a>
                <a href="{{ url_for('main.register') }}" class="btn btn-primary btn-lg px-4">Register</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
