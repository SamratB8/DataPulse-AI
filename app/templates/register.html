{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-header bg-success text-white text-center">
                <h4 class="mb-0">Student Registration</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('main.register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-4">
                        <label for="selected_class" class="form-label">Select Archetype</label>
                        <select class="form-select" id="selected_class" name="archetype" required>
                            <option value="Wrangler">Wrangler (Data Engineering)</option>
                            <option value="Architect">Architect (ML/DL)</option>
                            <option value="MLOps">MLOps (Infrastructure)</option>
                        </select>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Register</button>
                    </div>
                </form>
                <div class="mt-3 text-center">
                    <p class="mb-0">Already registered? <a href="{{ url_for('main.login') }}">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
